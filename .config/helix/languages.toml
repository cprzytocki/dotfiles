[[language]]
name = "javascript"
language-servers = ["typescript-language-server", "vscode-eslint-language-server"]
auto-format = true
formatter = { command = 'npx', args = ["prettier", "--parser", "typescript"] }

[[language]]
name = "typescript"
language-servers = ["typescript-language-server", "vscode-eslint-language-server"]
auto-format = true
formatter = { command = 'npx', args = ["prettier", "--parser", "typescript"] }

[[language]]
name = "tsx"
language-servers = ["typescript-language-server", "vscode-eslint-language-server"]
auto-format = true
formatter = { command = 'npx', args = ["prettier", "--parser", "typescript"] }

[[language]]
name = "jsx"
language-servers = ["typescript-language-server", "vscode-eslint-language-server"]
auto-format = true
formatter = { command = 'npx', args = ["prettier", "--parser", "typescript"] }

[[language]]
name = "json"
auto-format = false
formatter = { command = 'npx', args = ["prettier", "--parser", "json"] }
